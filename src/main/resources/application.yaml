server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE
          predicates:
            - Path=/api/v1/auth/**

eureka:
  instance:
    prefer-ip-address: true

  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/